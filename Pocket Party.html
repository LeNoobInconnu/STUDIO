<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Fun - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #87CEEB; /* Bleu ciel */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Style des cartes de jeu style "Cartoon Pro" */
        .game-card {
            aspect-ratio: 1 / 1;
            border: 4px solid #1a1a1a;
            border-radius: 24px;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 0 #1a1a1a;
            display: block;
        }

        .game-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 2px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            border-top: 3px solid #1a1a1a;
        }

        /* Animation d'apparition */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.3s ease-out forwards;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
        }

        /* Styles pour la navigation interactive */
        .nav-button {
            transition: all 0.2s;
            border-radius: 16px;
            padding: 8px;
        }

        .nav-button.active {
            background-color: #f0f9ff;
            color: #3b82f6;
            border: 2px solid #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

    <!-- Header -->
    <header class="pt-8 pb-4 px-6 text-center">
        <div class="inline-block bg-white border-4 border-black px-6 py-2 rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            <h1 id="menu-title" class="text-2xl font-bold text-black tracking-wide uppercase">
                Arcade
            </h1>
        </div>
    </header>

    <!-- Grille de Jeux -->
    <main class="flex-grow max-w-md mx-auto w-full">
        <div id="games-container" class="game-grid">
            
            <!-- JEU 1 : Envoie vers jeu1.html -->
            <a href="jeu1.html" class="game-card animate-pop bg-yellow-400">
                <img src="https://images.unsplash.com/photo-1614285457768-646f65ca8548?auto=format&fit=crop&w=300&q=80" alt="Jeu de Course">
                <div class="game-title-overlay">Course</div>
            </a>

            <!-- JEU 2 : Envoie vers jeu2.html -->
            <a href="jeu2.html" class="game-card animate-pop bg-red-400" style="animation-delay: 0.05s;">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=300&q=80" alt="Rétro">
                <div class="game-title-overlay">Arcade</div>
            </a>

            <!-- JEU 3 : Envoie vers jeu3.html -->
            <a href="jeu3.html" class="game-card animate-pop bg-green-400" style="animation-delay: 0.1s;">
                <img src="https://images.unsplash.com/photo-1593305841991-05c297ba4575?auto=format&fit=crop&w=300&q=80" alt="Football">
                <div class="game-title-overlay">Foot</div>
            </a>

            <!-- Slots vides pour le style -->
            <div class="game-card bg-white/30 border-dashed border-white flex items-center justify-center">
                <span class="text-white text-3xl font-bold">+</span>
            </div>
            <div class="game-card bg-white/30 border-dashed border-white flex items-center justify-center">
                <span class="text-white text-3xl font-bold">+</span>
            </div>
            <div class="game-card bg-white/30 border-dashed border-white flex items-center justify-center">
                <span class="text-white text-3xl font-bold">+</span>
            </div>

        </div>

        <!-- Section Profil cachée par défaut -->
        <div id="profile-container" class="hidden p-8 text-center animate-pop">
            <div class="w-24 h-24 bg-white border-4 border-black rounded-full mx-auto mb-4 overflow-hidden shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
            </div>
            <h2 class="text-2xl font-bold">Joueur</h2>
            <p class="text-blue-900 font-medium">Niveau 0</p>
            <div class="mt-6 bg-white border-4 border-black p-4 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <p class="font-bold uppercase">Prochainement</p>
                <div class="flex justify-between mt-2">
                    <span></span>
                    <span class="font-bold"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Navigation (Interactive) -->
    <footer class="fixed bottom-6 left-0 right-0 px-6">
        <div class="max-w-md mx-auto flex justify-around items-center bg-white border-4 border-black rounded-3xl p-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            
            <!-- Bouton Home -->
            <button onclick="switchTab('home')" id="btn-home" class="nav-button active text-blue-500">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>

            <!-- Bouton Profil -->
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-button text-gray-400">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>

        </div>
    </footer>

    <script>
        function switchTab(tabName) {
            const gamesContainer = document.getElementById('games-container');
            const profileContainer = document.getElementById('profile-container');
            const btnHome = document.getElementById('btn-home');
            const btnProfile = document.getElementById('btn-profile');
            const title = document.getElementById('menu-title');

            if (tabName === 'home') {
                // Afficher les jeux
                gamesContainer.classList.remove('hidden');
                gamesContainer.classList.add('grid');
                profileContainer.classList.add('hidden');
                
                // Activer le bouton home
                btnHome.classList.add('active', 'text-blue-500');
                btnHome.classList.remove('text-gray-400');
                btnProfile.classList.remove('active', 'text-blue-500');
                btnProfile.classList.add('text-gray-400');
                
                title.innerText = "Arcade Fun";
            } else {
                // Afficher le profil
                gamesContainer.classList.add('hidden');
                gamesContainer.classList.remove('grid');
                profileContainer.classList.remove('hidden');
                
                // Activer le bouton profil
                btnProfile.classList.add('active', 'text-blue-500');
                btnProfile.classList.remove('text-gray-400');
                btnHome.classList.remove('active', 'text-blue-500');
                btnHome.classList.add('text-gray-400');
                
                title.innerText = "Mon Profil";
            }
        }
    </script>

</body>
</html>
