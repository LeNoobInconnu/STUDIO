
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Stream Fin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        .main-title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            animation: fadeInDown 1.5s ease-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-bottom: 3rem;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .socials-container {
            display: flex;
            gap: 2rem;
            animation: fadeInUp 1.5s ease-out 1s both;
            pointer-events: auto;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .social-item i {
            font-size: 1.5rem;
        }

        .tag {
            font-weight: 700;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.8; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            animation: pulse-animation 3s infinite ease-in-out;
        }

        @keyframes pulse-animation {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.3; }
        }

        .footer-status {
            position: absolute;
            bottom: 3rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <h1 class="main-title">Fin du <span class="text-white">stream</span></h1>
        <p class="subtitle">Merci d'avoir regardé !</p>
        
        <div class="socials-container">
            <!-- YouTube -->
            <div class="social-item">
                <i class="fab fa-youtube text-red-500"></i>
                <span class="tag">LeNoobInconnu</span>
            </div>

            <!-- X (Twitter) -->
            <div class="social-item">
                <i class="fab fa-x-twitter text-white"></i>
                <span class="tag">@LeNoobInconnu</span>
            </div>

            <!-- Twitch -->
            <div class="social-item">
                <i class="fab fa-twitch text-purple-500"></i>
                <span class="tag">LeNoobInconnu</span>
            </div>
        </div>

        <div class="footer-status pulse">À bientôt pour le prochain live</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 80;
        const connectionDistance = 160;
        
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4; // Vitesse lente confirmée
                this.speedY = (Math.random() - 0.5) * 0.4;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        const opacity = (1 - distance / connectionDistance) * 0.12; // Traits très discrets
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        
        init();
        animate();
    </script>
</body>
</html>
